spring.application.name=intranet-school

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/intranet}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}

# CORS — en dev usá http://localhost:4200; en prod seteá CORS_ALLOWED_ORIGINS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# RENIEC API
reniec.api.url=https://api.decolecta.com/v1/reniec/dni
reniec.api.token=${RENIEC_TOKEN}
